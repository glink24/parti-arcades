name: Sync games to market branches

on:
  push:
    branches: [main]
    paths:
      - 'games/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed game directories
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED=$(ls games/ | tr '\n' ' ')
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- games/ | cut -d/ -f2 | sort -u | tr '\n' ' ')
          else
            CHANGED=$(ls games/ | tr '\n' ' ')
          fi
          echo "Changed games: ${CHANGED}"
          echo "games=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Sync each game to its market branch
        run: |
          for game in ${{ steps.changes.outputs.games }}; do
            if [ ! -d "games/${game}" ]; then
              echo "Skipping ${game}: directory not found"
              continue
            fi
            BRANCH="market-${game}"
            echo "Publishing ${game} to branch ${BRANCH}..."

            TMPDIR=$(mktemp -d)
            cp -R "games/${game}/." "$TMPDIR/"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git checkout --orphan "${BRANCH}-tmp" 2>/dev/null || true
            git rm -rf --ignore-unmatch . 2>/dev/null || true

            cp -R "$TMPDIR/." .

            git add -A
            git commit -m "publish ${game} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes for ${game}"
            git push -f origin "HEAD:${BRANCH}" || echo "Push failed for ${BRANCH}"

            git checkout main
            rm -rf "$TMPDIR"
          done

      - name: Refresh market issues on glink25/Parti
        if: env.MARKET_REGISTRY_TOKEN
        env:
          GH_TOKEN: ${{ secrets.MARKET_REGISTRY_TOKEN }}
        run: |
          REGISTRY="glink25/Parti"
          for game in ${{ steps.changes.outputs.games }}; do
            if [ ! -d "games/${game}" ]; then
              continue
            fi
            TITLE="[parti-room] glink24/parti-arcades@market-${game}"
            echo "Looking for issue: ${TITLE}"

            ISSUE_NUM=$(gh issue list \
              --repo "$REGISTRY" \
              --search "\"${TITLE}\" in:title" \
              --state open \
              --json number \
              --jq '.[0].number' 2>/dev/null || true)

            if [ -z "$ISSUE_NUM" ] || [ "$ISSUE_NUM" = "null" ]; then
              echo "  No open issue found for ${game}, skipping"
              continue
            fi

            echo "  Found issue #${ISSUE_NUM}, refreshing..."

            BODY=$(gh issue view "$ISSUE_NUM" --repo "$REGISTRY" --json body --jq '.body')
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            UPDATED_BODY=$(printf '%s\n\n<!-- parti-auto-refresh: %s -->' "$BODY" "$TIMESTAMP")

            echo "$UPDATED_BODY" | gh issue edit "$ISSUE_NUM" --repo "$REGISTRY" --body-file -
            echo "  Issue #${ISSUE_NUM} refreshed, triage will re-check"
          done
