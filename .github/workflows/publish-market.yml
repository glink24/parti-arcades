name: Sync games to market branches

on:
  push:
    branches: [main]
    paths:
      - 'games/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed game directories
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED=$(ls games/ | tr '\n' ' ')
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- games/ | cut -d/ -f2 | sort -u | tr '\n' ' ')
          else
            CHANGED=$(ls games/ | tr '\n' ' ')
          fi
          echo "Changed games: ${CHANGED}"
          echo "games=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Sync each game to its market branch
        run: |
          for game in ${{ steps.changes.outputs.games }}; do
            if [ ! -d "games/${game}" ]; then
              echo "Skipping ${game}: directory not found"
              continue
            fi
            BRANCH="market-${game}"
            echo "Publishing ${game} to branch ${BRANCH}..."

            TMPDIR=$(mktemp -d)
            cp -R "games/${game}/." "$TMPDIR/"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git checkout --orphan "${BRANCH}-tmp" 2>/dev/null || true
            git rm -rf --ignore-unmatch . 2>/dev/null || true

            cp -R "$TMPDIR/." .

            git add -A
            git commit -m "publish ${game} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes for ${game}"
            git push -f origin "HEAD:${BRANCH}" || echo "Push failed for ${BRANCH}"

            git checkout main
            rm -rf "$TMPDIR"
          done

      - name: Publish or refresh market issues on glink25/Parti
        if: ${{ secrets.MARKET_REGISTRY_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.MARKET_REGISTRY_TOKEN }}
        run: |
          REGISTRY="glink25/Parti"
          for game in ${{ steps.changes.outputs.games }}; do
            if [ ! -d "games/${game}" ]; then
              continue
            fi
            TITLE="[parti-room] glink24/parti-arcades@market-${game}"
            echo "=== ${game} ==="

            DESC=$(python3 -c "import json; d=json.load(open('games/${game}/parti.room.json')); print(d.get('description',''))" 2>/dev/null || true)
            VERSION=$(python3 -c "import json; d=json.load(open('games/${game}/parti.room.json')); print(d.get('version','0.1.0'))" 2>/dev/null || true)

            ISSUE_NUM=$(gh issue list \
              --repo "$REGISTRY" \
              --search "\"${TITLE}\" in:title" \
              --state open \
              --json number \
              --jq '.[0].number' 2>/dev/null || true)

            if [ -z "$ISSUE_NUM" ] || [ "$ISSUE_NUM" = "null" ]; then
              echo "  No existing issue, creating..."
              ISSUE_BODY=$(printf '### 房间仓库 / Room repository\n\n%s\n\n### Git ref（可选 / optional）\n\n%s\n\n### 游戏简介 / Game introduction\n\n%s\n\n### 发布前确认 / Pre-flight checklist\n\n- [x] 仓库中包含 parti.room.json 和 manifest entry 声明的全部文件，且已在 Parti web 中验证可正常游玩\n- [x] manifest 的 id、name、version、description 填写完整（市场列表直接展示）\n\n> 版本: %s' \
                "glink24/parti-arcades" \
                "market-${game}" \
                "${DESC}" \
                "${VERSION}")
              gh issue create \
                --repo "$REGISTRY" \
                --title "$TITLE" \
                --body "$ISSUE_BODY"
              echo "  Issue created, waiting for triage"
            else
              echo "  Found issue #${ISSUE_NUM}, refreshing..."
              BODY=$(gh issue view "$ISSUE_NUM" --repo "$REGISTRY" --json body --jq '.body')
              TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
              UPDATED_BODY=$(printf '%s\n\n<!-- parti-auto-refresh: %s -->' "$BODY" "$TIMESTAMP")
              echo "$UPDATED_BODY" | gh issue edit "$ISSUE_NUM" --repo "$REGISTRY" --body-file -
              echo "  Issue #${ISSUE_NUM} refreshed"
            fi
          done
