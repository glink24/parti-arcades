<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg-ttt" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg-ttt)"/>
  <rect x="112" y="34" width="176" height="176" rx="8" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="58%" y1="34" x2="58%" y2="210" stroke="#334155" stroke-width="1.5"/>
  <line x1="42%" y1="34" x2="42%" y2="210" stroke="#334155" stroke-width="1.5"/>
  <line x1="112" y1="41%" x2="288" y2="41%" stroke="#334155" stroke-width="1.5"/>
  <line x1="112" y1="59%" x2="288" y2="59%" stroke="#334155" stroke-width="1.5"/>

  <!-- X marks -->
  <g transform="translate(53%, 42%) translate(-18, -18)">
    <line x1="0" y1="0" x2="36" y2="36" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="0" x2="0" y2="36" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(69%, 60%) translate(-18, -18)">
    <line x1="0" y1="0" x2="36" y2="36" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="0" x2="0" y2="36" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(37%, 60%) translate(-18, -18)">
    <line x1="0" y1="0" x2="36" y2="36" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="0" x2="0" y2="36" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- O marks -->
  <circle cx="37%" cy="41%" r="19" fill="none" stroke="#f43f5e" stroke-width="3"/>
  <circle cx="69%" cy="41%" r="19" fill="none" stroke="#f43f5e" stroke-width="3"/>

  <!-- Win line -->
  <line x1="124" y1="104" x2="276" y2="104" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 3" opacity="0.7"/>

  <!-- Text -->
  <text x="200" y="188" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0" font-family="sans-serif">井字棋</text>
  <text x="200" y="208" text-anchor="middle" font-size="12" fill="#64748b" font-family="sans-serif">三连即赢，但友谊可能就此终结</text>
</svg>
